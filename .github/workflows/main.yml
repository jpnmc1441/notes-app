name: Build Windows Installer

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build NotesApp-Setup.exe
    runs-on: windows-latest

    - name: Checkout
        uses: actions/checkout@v4

      - name: Move files to root
        shell: pwsh
        run: |
          Get-ChildItem -Path "NotesApp" | Move-Item -Destination "."
          Remove-Item "NotesApp" -Force -Recurse

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate app icon
        run: python create_icon.py

      - name: Build executable with PyInstaller
        run: pyinstaller NotesApp.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify installer was created
        shell: pwsh
        run: |
          $f = "Output\NotesApp-Setup.exe"
          if (-not (Test-Path $f)) { Write-Error "Installer not found!"; exit 1 }
          $mb = [math]::Round((Get-Item $f).Length / 1MB, 1)
          Write-Host "NotesApp-Setup.exe — $mb MB"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotesApp-Setup-windows
          path: Output\NotesApp-Setup.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output\NotesApp-Setup.exe
          generate_release_notes: true
